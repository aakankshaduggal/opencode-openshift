---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencode-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opencode
  template:
    metadata:
      labels:
        app: opencode
    spec:
      serviceAccountName: opencode-web
      containers:
        - name: oauth-proxy
          image: registry.redhat.io/openshift4/ose-oauth-proxy-rhel9:latest
          args:
            - --https-address=:8443
            - --provider=openshift
            - --openshift-service-account=opencode-web
            - --upstream=http://localhost:8003
            - --tls-cert=/etc/tls/private/tls.crt
            - --tls-key=/etc/tls/private/tls.key
            - --cookie-secret-file=/etc/proxy/secrets/session_secret
            - --openshift-sar={"namespace":"opencode","resource":"services","verb":"get"}
          ports:
            - containerPort: 8443
              name: oauth-proxy
          volumeMounts:
            - name: proxy-tls
              mountPath: /etc/tls/private
            - name: proxy-cookie-secret
              mountPath: /etc/proxy/secrets
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
        - name: opencode-web
          image: quay.io/aicatalyst/opencode:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              CONFIG=$(cat /config-template/config-template.json)
              CONFIG=${CONFIG//\$\{BASE_URL\}/$BASE_URL}
              CONFIG=${CONFIG//\$\{API_KEY\}/$API_KEY}
              CONFIG=${CONFIG//\$\{MODEL_NAME\}/$MODEL_NAME}
              export OPENCODE_CONFIG_CONTENT="$CONFIG"
              exec opencode web --hostname 0.0.0.0 --port 8003
          ports:
            - containerPort: 8003
          env:
            - name: BASE_URL
              valueFrom:
                secretKeyRef:
                  name: opencode-web-secret
                  key: BASE_URL
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: opencode-web-secret
                  key: API_KEY
            - name: MODEL_NAME
              valueFrom:
                secretKeyRef:
                  name: opencode-web-secret
                  key: MODEL_NAME
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: opencode-web-pvc
              mountPath: /opt/app-root/workspace
            - name: config-template
              mountPath: /config-template
      volumes:
        - name: opencode-web-pvc
          persistentVolumeClaim:
            claimName: opencode-web-pvc
        - name: config-template
          configMap:
            name: opencode-web-config
        - name: proxy-tls
          secret:
            secretName: opencode-web-tls
        - name: proxy-cookie-secret
          secret:
            secretName: opencode-web-proxy-cookie
